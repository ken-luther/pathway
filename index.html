<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>

<title>Pathway v3</title>
<!-- v2.1 -->
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0D2461;--primary:#1A56DB;--primary-light:#EEF4FF;
  --teal:#0E7490;--teal-light:#E0F7FA;
  --amber:#F59F00;--amber-light:#FFF8E1;
  --success:#16A34A;--success-light:#F0FDF4;
  --danger:#DC2626;--danger-light:#FFF1F2;
  --text:#0F172A;--muted:#64748B;--border:#E8EDF5;--off:#F8FAFC;
  --r:20px;--rs:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-font-smoothing:antialiased;}
#app{height:100%;display:flex;flex-direction:column;max-width:430px;margin:0 auto;background:#F8FAFC;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.screen{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:30px;}
.screen::-webkit-scrollbar{display:none;}

/* Buttons */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:16px 22px;border-radius:var(–r);font-size:16px;font-weight:700;cursor:pointer;border:none;font-family:inherit;width:100%;margin-bottom:12px;text-align:center;transition:transform .1s,opacity .1s;letter-spacing:.01em;}
.btn:active{transform:scale(.97);opacity:.9;}
.btn-p{background:linear-gradient(135deg,var(–primary),#2563EB);color:#fff;box-shadow:0 4px 15px rgba(26,86,219,.35);}
.btn-o{background:#fff;color:var(–primary);border:2.5px solid var(–primary);}
.btn-g{background:transparent;color:var(–muted);border:none;font-size:14px;}
.btn-d{background:#fff;color:var(–danger);border:2.5px solid var(–danger);}
.btn-sm{padding:9px 16px;font-size:13px;border-radius:var(–rs);width:auto;margin-bottom:0;display:inline-flex;font-weight:600;}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none;}

/* Inputs */
.field{margin-bottom:16px;}
.field label{display:block;font-size:14px;font-weight:700;margin-bottom:8px;color:var(–text);}
.field input,.field select,.field textarea{
padding:15px 18px;border:2.5px solid var(–border);border-radius:var(–rs);
font-size:16px;font-family:inherit;color:var(–text);background:#fff;
outline:none;width:100%;transition:border-color .2s,box-shadow .2s;
box-shadow:0 1px 3px rgba(0,0,0,.04);
}
.field input:focus,.field select:focus,.field textarea:focus{
border-color:var(–primary);box-shadow:0 0 0 4px rgba(26,86,219,.1);
}
.field textarea{resize:vertical;min-height:90px;line-height:1.6;}

/* Cards */
.card{background:#fff;border-radius:var(–r);padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06),0 8px 24px rgba(0,0,0,.04);border:1.5px solid var(–border);margin-bottom:14px;}

/* Nav */
.bnav{display:flex;align-items:center;justify-content:space-around;padding:12px 0 max(12px,env(safe-area-inset-bottom));background:#fff;border-top:1.5px solid var(–border);flex-shrink:0;box-shadow:0 -4px 20px rgba(0,0,0,.06);}
.ni{display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 18px;cursor:pointer;border:none;background:none;font-family:inherit;border-radius:12px;transition:background .2s;}
.ni span:first-child{font-size:24px;transition:transform .2s;}
.ni span:last-child{font-size:11px;font-weight:700;color:var(–muted);letter-spacing:.02em;}
.ni.act{background:var(–primary-light);}
.ni.act span:last-child{color:var(–primary);}
.ni.act span:first-child{transform:scale(1.2);}

/* Header */
.hdr{padding:16px 22px;display:flex;align-items:center;justify-content:space-between;background:#fff;border-bottom:1.5px solid var(–border);flex-shrink:0;}

/* XP Badge */
.xpb{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,var(–amber),#F97316);color:#fff;padding:7px 14px;border-radius:20px;font-size:14px;font-weight:700;box-shadow:0 3px 10px rgba(245,159,0,.3);}

/* Progress bar */
.pb{height:8px;background:var(–border);border-radius:99px;overflow:hidden;margin:6px 0 10px;}
.pf{height:100%;background:linear-gradient(90deg,var(–primary),var(–teal));border-radius:99px;transition:width .5s ease;}

/* Chips */
.chip{display:inline-flex;align-items:center;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;}
.chip-g{background:var(–success-light);color:#166534;}
.chip-a{background:var(–amber-light);color:#92400E;}
.chip-b{background:var(–teal-light);color:var(–teal);}

/* Survey options */
.sopt{display:flex;align-items:center;gap:14px;padding:15px 16px;border:2.5px solid var(–border);border-radius:var(–rs);cursor:pointer;margin-bottom:10px;background:#fff;width:100%;text-align:left;font-family:inherit;font-size:15px;font-weight:500;transition:all .15s;box-shadow:0 1px 4px rgba(0,0,0,.04);}
.sopt:active{transform:scale(.98);}
.sopt.sel{border-color:var(–primary);background:var(–primary-light);box-shadow:0 0 0 3px rgba(26,86,219,.1);}
.dot{width:20px;height:20px;border-radius:50%;border:2.5px solid var(–border);flex-shrink:0;transition:all .15s;display:flex;align-items:center;justify-content:center;}
.sopt.sel .dot{border-color:var(–primary);background:var(–primary);}
.sopt.sel .dot::after{content:‘✓’;color:#fff;font-size:11px;font-weight:700;}

/* Quiz options */
.qo{display:flex;align-items:flex-start;gap:12px;padding:15px 16px;border:2.5px solid var(–border);border-radius:var(–rs);cursor:pointer;margin-bottom:11px;background:#fff;width:100%;text-align:left;font-family:inherit;font-size:15px;line-height:1.55;font-weight:500;transition:all .15s;box-shadow:0 1px 4px rgba(0,0,0,.04);}
.qo:active{transform:scale(.99);}
.qo.sel{border-color:var(–primary);background:var(–primary-light);}
.qo.ok{border-color:var(–success);background:var(–success-light);}
.qo.wr{border-color:var(–danger);background:var(–danger-light);}
.ql{width:28px;height:28px;border-radius:8px;background:var(–off);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0;color:var(–muted);border:2px solid var(–border);}
.qo.ok .ql{background:var(–success);color:#fff;border-color:var(–success);}
.qo.wr .ql{background:var(–danger);color:#fff;border-color:var(–danger);}
.qo.sel:not(.ok):not(.wr) .ql{background:var(–primary);color:#fff;border-color:var(–primary);}

/* Lesson rows */
.lr{display:flex;align-items:center;gap:14px;padding:15px 0;border-bottom:1.5px solid var(–border);cursor:pointer;transition:opacity .15s;}
.lr:active{opacity:.7;}
.lr:last-child{border-bottom:none;}
.li{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:flex-end;justify-content:center;z-index:999;backdrop-filter:blur(4px);}
.modal{background:#fff;border-radius:28px 28px 0 0;padding:24px 24px 44px;width:100%;max-width:430px;max-height:92vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,0,0,.15);}
.hdl{width:40px;height:5px;background:var(–border);border-radius:99px;margin:0 auto 20px;}

/* Feedback boxes */
.eb{background:var(–danger-light);border:2px solid #FECACA;border-radius:var(–rs);padding:14px 16px;font-size:14px;color:var(–danger);margin-bottom:14px;font-weight:500;line-height:1.5;}
.sb{background:var(–success-light);border:2px solid #BBF7D0;border-radius:var(–rs);padding:14px 16px;font-size:14px;color:var(–success);margin-bottom:14px;font-weight:500;line-height:1.5;}

/* Spinner */
.spin{width:22px;height:22px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;display:inline-block;vertical-align:middle;}
.spin-d{border-color:rgba(0,0,0,.1);border-top-color:var(–primary);}
@keyframes sp{to{transform:rotate(360deg)}}

/* Sections */
.hero{background:linear-gradient(145deg,var(–navy) 0%,#1A4080 100%);padding:30px 22px 26px;color:#fff;}
.oh{background:linear-gradient(160deg,var(–navy) 0%,#1E4976 55%,var(–teal) 100%);padding:60px 28px 44px;text-align:center;position:relative;overflow:hidden;}
.oh::before{content:’’;position:absolute;top:-60px;right:-60px;width:220px;height:220px;border-radius:50%;background:rgba(255,255,255,.05);}
.oh::after{content:’’;position:absolute;bottom:-80px;left:-40px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.04);}

/* Grid */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px;}

/* Empty state */
.empty{text-align:center;padding:48px 24px;color:var(–muted);}
.empty .icon{font-size:56px;margin-bottom:14px;display:block;}

/* Typography */
h2{font-size:22px;font-weight:700;line-height:1.25;}
h3{font-size:16px;font-weight:700;}
</style>

</head>

// – SUPABASE —————————————————————–
async function api(path, opts) {
try {
const r = await fetch(SB_URL + path, opts);
const text = await r.text();
const d = text ? JSON.parse(text) : {};
return { ok: r.ok, data: d, status: r.status };
} catch(e) { return { ok: false, data: {}, error: e.message }; }
}

function authH(token) {
// Always use anon key as base, upgrade with user token if available
var headers = {}; for (var _k in H) headers[_k] = H[_k];
if (token) headers[‘Authorization’] = ’Bearer ’ + token;
return headers;
}

async function sbSignUp(email, password) {
return api(’/auth/v1/signup’, { method:‘POST’, headers:H, body:JSON.stringify({email,password}) });
}
async function sbSignIn(email, password) {
return api(’/auth/v1/token?grant_type=password’, { method:‘POST’, headers:H, body:JSON.stringify({email,password}) });
}
async function sbSignOut(token) {
return api(’/auth/v1/logout’, { method:‘POST’, headers:authH(token) });
}

// Upload profile picture to Supabase Storage
async function uploadAvatar(file, userId, token) {
try {
const ext = file.name.split(’.’).pop().toLowerCase();
const path = userId+’.’+ext;
const r = await fetch(SB_URL+’/storage/v1/object/avatars/’+path, {
method:‘POST’,
headers:(function(){var _h=authH(S.token);_h[‘Content-Type’]=file.type;_h[‘x-upsert’]=‘true’;return _h;})(),
body:file
});
if(!r.ok){console.error(‘Avatar upload failed’);return null;}
return SB_URL+’/storage/v1/object/public/avatars/’+path;
} catch(e){console.error(‘Avatar error:’,e);return null;}
}

// Get badges for user
async function getUserBadges(userId, token) {
const r = await sbGet(‘user_badges’,’?user_id=eq.’+userId+’&order=earned_at.desc’,token);
return r.ok && Array.isArray(r.data) ? r.data : [];
}

// Award badge
async function awardBadge(userId, courseId, courseTitle, emoji, token) {
const row = {
id: crypto.randomUUID(),
user_id: userId,
course_id: courseId,
course_title: courseTitle,
emoji: emoji||‘🏆’,
earned_at: new Date().toISOString()
};
const r = await sbPost(‘user_badges’, row, token);
// Also store locally
const badges = JSON.parse(localStorage.getItem(‘pw_badges’)||’[]’);
if(!badges.find(b=>b.course_id===courseId)){
badges.push(row);
localStorage.setItem(‘pw_badges’,JSON.stringify(badges));
}
return r.ok;
}
async function sbGet(table, query, token) {
return api(’/rest/v1/’+table+(query||’’), { headers:(function(){var _h={}; var _src=authH(token); for(var _k in _src)_h[_k]=_src[_k]; _h[‘Accept’]=‘application/json’; return _h;})() });
}
async function sbPost(table, body, token) {
const headers = (function(){var _h={}; var _src=authH(token); for(var _k in _src)_h[_k]=_src[_k]; _h[‘Prefer’]=‘resolution=merge-duplicates,return=representation’; return _h;})();
const result = await api(’/rest/v1/’+table, { method:‘POST’, headers, body:JSON.stringify(body) });
if(!result.ok) console.error(‘sbPost failed on ‘+table+’:’, JSON.stringify(result.data));
return result;
}
async function sbPatch(table, query, body, token) {
const headers = (function(){var _h={}; var _src=authH(token); for(var _k in _src)_h[_k]=_src[_k]; _h[‘Prefer’]=‘return=representation’; return _h;})();
return api(’/rest/v1/’+table+(query||’’), { method:‘PATCH’, headers, body:JSON.stringify(body) });
}
async function sbDelete(table, query, token) {
return api(’/rest/v1/’+table+(query||’’), { method:‘DELETE’, headers:authH(token) });
}

// Load full course tree
async function loadCourses(token, publishedOnly) {
const q = publishedOnly ? ‘?published=eq.true&order=order_index.asc’ : ‘?order=order_index.asc’;
const [cr, mr, lr, qr] = await Promise.all([
sbGet(‘courses’, q, token),
sbGet(‘modules’, ‘?order=order_index.asc’, token),
sbGet(‘lessons’, ‘?order=order_index.asc’, token),
sbGet(‘questions’, ‘?order=order_index.asc’, token),
]);
const courses = cr.ok && Array.isArray(cr.data) ? cr.data : [];
const modules = mr.ok && Array.isArray(mr.data) ? mr.data : [];
const lessons = lr.ok && Array.isArray(lr.data) ? lr.data : [];
const questions = qr.ok && Array.isArray(qr.data) ? qr.data : [];
return courses.map(c => ({
…c,
modules: modules.filter(m=>m.course_id===c.id).map(m => ({
…m,
lessons: lessons.filter(l=>l.module_id===m.id).map(l => ({
…l,
type: l.lesson_type,
xp: l.xp_reward || 10,
questions: questions.filter(q=>q.lesson_id===l.id).map(q => ({
id:q.id, text:q.question_text,
opts:[q.option_a,q.option_b,q.option_c,q.option_d],
ans:q.correct_answer, exp:q.explanation||’’
}))
}))
}))
}));
}

// – STATE ––––––––––––––––––––––––––––––––––
const S = {
user: null,
token: null,
courses: [],
progress: {},
tab: ‘home’,

init() {
try { this.user = JSON.parse(localStorage.getItem(‘pw_u’)||‘null’); } catch(e){}
try { this.progress = JSON.parse(localStorage.getItem(‘pw_p’)||’{}’); } catch(e){}
this.token = localStorage.getItem(‘pw_t’)||null;
},
saveUser(u) { this.user=u; localStorage.setItem(‘pw_u’, JSON.stringify(u)); },
saveToken(t) { this.token=t; if(t) localStorage.setItem(‘pw_t’,t); else localStorage.removeItem(‘pw_t’); },
complete(id, xp) {
this.progress[id]=true;
localStorage.setItem(‘pw_p’, JSON.stringify(this.progress));
if(this.user){
const realXP = this.totalXP; // recalculate from progress
this.user.xp_total = realXP;
localStorage.setItem(‘pw_u’,JSON.stringify(this.user));
// Sync to Supabase by email (most reliable)
if(this.user.email&&this.token){
fetch(SB_URL+’/rest/v1/profiles?email=eq.’+encodeURIComponent(this.user.email),
{method:‘PATCH’,headers:(function(){var _h={}; var _src=H; for(var _k in _src)_h[_k]=_src[_k]; _h[‘Prefer’]=‘return=minimal’; return _h;})(),body:JSON.stringify({xp_total:realXP})});
}
// Check if any course is now fully complete
this.checkCourseCompletion(id);
}
},
checkCourseCompletion(lessonId) {
for(const course of this.courses){
const lessons=course.modules.flatMap(m=>m.lessons);
if(!lessons.length) continue;
if(!lessons.find(l=>l.id===lessonId)) continue; // not in this course
const allDone=lessons.every(l=>this.progress[l.id]);
if(allDone){
const badges=this.getBadges();
if(!badges.find(b=>b.course_id===course.id)){
// Award badge!
if(this.user&&this.user.id&&this.token){
awardBadge(this.user.id,course.id,course.title,course.emoji||‘🏆’,this.token);
} else {
// Local only
const row={id:‘b’+Date.now(),user_id:(this.user&&this.user.id)||‘local’,course_id:course.id,course_title:course.title,emoji:course.emoji||‘🏆’,earned_at:new Date().toISOString()};
const existing=this.getBadges();
existing.push(row);
localStorage.setItem(‘pw_badges’,JSON.stringify(existing));
}
// Show celebration
setTimeout(()=>showBadgeToast(course.emoji||‘🏆’,course.title),300);
}
}
}
},
isDone(id){ return !!this.progress[id]; },
getBadges(){ try{return JSON.parse(localStorage.getItem(‘pw_badges’)||’[]’);}catch{return[];} },
get totalXP(){ return Object.keys(this.progress).reduce((s,id)=>{ const l=this.courses.flatMap(c=>c.modules.flatMap(m=>m.lessons)).find(l=>l.id===id); return s+(l?l.xp:0); },0); }
};

// – DOM HELPERS —————————————————————
function h(tag, attrs, …kids) {
const e = document.createElement(tag);
if(attrs) Object.entries(attrs).forEach(([k,v])=>{
if(k===‘class’) e.className=v;
else if(k===‘style’&&typeof v===‘object’) Object.assign(e.style,v);
else if(typeof v===‘function’) e.addEventListener(k,v);
else if(k!==‘class’) e.setAttribute(k,v);
});
kids.flat(99).forEach(c=>{ if(c==null||c===false) return; e.appendChild(typeof c===‘string’||typeof c===‘number’?document.createTextNode(’’+c):c); });
return e;
}
const div=(a,…k)=>h(‘div’,a,…k);
const p=(a,…k)=>h(‘p’,a,…k);
const span=(a,…k)=>h(‘span’,a,…k);
const btn=(a,…k)=>h(‘button’,a,…k);
const inp=(a)=>h(‘input’,a);
const sel=(a,…k)=>h(‘select’,a,…k);
const opt=(a,…k)=>h(‘option’,a,…k);
const ta=(a)=>h(‘textarea’,a);
const label=(a,…k)=>h(‘label’,a,…k);
const iframe=(a)=>h(‘iframe’,a);

function mount(el) {
const app=document.getElementById(‘app’);
app.innerHTML=’’;
app.appendChild(el);

  if(!vals[key]) s.appendChild(blank);

    const op=h('option',{value:o},o);
    if(vals[key]===o) op.selected=true;
