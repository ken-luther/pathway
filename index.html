<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>The Pathway Project</title>
<!-- v2.1 -->
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0D2461;
  --primary:#1A56DB;
  --primary-light:#EEF4FF;
  --primary-mid:#2563EB;
  --teal:#0E7490;
  --teal-light:#E0F7FA;
  --amber:#F59F00;
  --amber-light:#FFF8E1;
  --success:#16A34A;
  --success-light:#F0FDF4;
  --danger:#DC2626;
  --danger-light:#FFF1F2;
  --text:#0F172A;
  --muted:#64748B;
  --border:#E8EDF5;
  --off:#F8FAFC;
  --r:20px;
  --rs:14px;
  --shadow-sm: 0 2px 8px rgba(0,0,0,.07);
  --shadow-md: 0 4px 20px rgba(0,0,0,.10);
  --shadow-lg: 0 8px 32px rgba(0,0,0,.13);
}

*{ box-sizing:border-box; margin:0; padding:0; }
html,body{
height:100%;
font-family:‘DM Sans’,sans-serif;
background: linear-gradient(145deg,#1A1A2E 0%,#16213E 50%,#0F3460 100%);
-webkit-font-smoothing:antialiased;
}
#app{
height:100%;
display:flex;
flex-direction:column;
max-width:430px;
margin:0 auto;
background:#F8FAFC;
overflow:hidden;
box-shadow: 0 8px 40px rgba(26,86,219,.15), 0 0 0 1px rgba(26,86,219,.08);
border-radius:0;
}
.screen{
flex:1;
overflow-y:auto;
-webkit-overflow-scrolling:touch;
padding-bottom:30px;
}
.screen::-webkit-scrollbar{ display:none; }

/* ── Buttons ──────────────────────────────── */
.btn{
display:flex; align-items:center; justify-content:center; gap:8px;
padding:16px 22px; border-radius:var(–r);
font-size:16px; font-weight:800; cursor:pointer; border:none;
font-family:inherit; width:100%; margin-bottom:12px;
text-align:center; letter-spacing:.02em;
transition: transform .12s cubic-bezier(.34,1.56,.64,1), opacity .1s, box-shadow .15s;
position:relative; overflow:hidden;
}
.btn:active{ transform:scale(.95); opacity:.92; }
.btn:disabled{ opacity:.4; cursor:not-allowed; transform:none !important; }

.btn-p{
background: linear-gradient(135deg,#1A56DB,#2563EB);
color:#fff;
box-shadow: 0 4px 0 #1040B0, 0 6px 20px rgba(26,86,219,.35);
}
.btn-p:active{ box-shadow: 0 1px 0 #1040B0, 0 2px 8px rgba(26,86,219,.2); transform:scale(.97) translateY(2px); }

.btn-o{
background:#fff; color:var(–primary);
border:2.5px solid var(–primary);
box-shadow: 0 3px 0 #c7d9f7;
}
.btn-o:active{ transform:scale(.97) translateY(2px); box-shadow:0 1px 0 #c7d9f7; }

.btn-g{ background:transparent; color:var(–muted); border:none; font-size:14px; font-weight:600; }
.btn-d{
background:#fff; color:var(–danger);
border:2.5px solid var(–danger);
box-shadow: 0 3px 0 #f5c6c6;
}
.btn-d:active{ transform:scale(.97) translateY(2px); box-shadow:0 1px 0 #f5c6c6; }

.btn-sm{ padding:9px 16px; font-size:13px; border-radius:var(–rs); width:auto; margin-bottom:0; display:inline-flex; }
.btn-icon{ background:none; border:none; cursor:pointer; padding:4px 6px; font-size:16px; border-radius:8px; transition:transform .12s cubic-bezier(.34,1.56,.64,1), background .1s; }
.btn-icon:active{ transform:scale(.82); background:var(–off); }

/* ── Inputs ───────────────────────────────── */
.field{ margin-bottom:16px; }
.field label{ display:block; font-size:14px; font-weight:700; margin-bottom:8px; color:var(–text); }
.field input,.field select,.field textarea{
padding:15px 18px; border:2.5px solid var(–border); border-radius:var(–rs);
font-size:16px; font-family:inherit; color:var(–text); background:#fff;
outline:none; width:100%;
transition:border-color .2s, box-shadow .2s;
box-shadow: 0 1px 3px rgba(0,0,0,.04);
}
.field input:focus,.field select:focus,.field textarea:focus{
border-color:var(–primary);
box-shadow: 0 0 0 4px rgba(26,86,219,.12);
}
.field textarea{ resize:vertical; min-height:90px; line-height:1.6; }

/* ── Cards ────────────────────────────────── */
.card{
background:#fff;
border-radius:var(–r);
padding:20px;
box-shadow: var(–shadow-sm);
border:1.5px solid var(–border);
margin-bottom:14px;
transition: transform .15s cubic-bezier(.34,1.56,.64,1), box-shadow .15s;
}
.card:active{ transform:scale(.985); box-shadow:0 1px 4px rgba(0,0,0,.06); }

/* ── Nav ──────────────────────────────────── */
.bnav{
display:flex; align-items:center; justify-content:space-around;
padding:10px 0 max(10px,env(safe-area-inset-bottom));
background:#fff;
border-top:1.5px solid var(–border);
flex-shrink:0;
box-shadow: 0 -4px 24px rgba(0,0,0,.07);
}
.ni{
display:flex; flex-direction:column; align-items:center; gap:3px;
padding:6px 16px; cursor:pointer; border:none; background:none;
font-family:inherit; border-radius:16px;
transition: background .18s;
-webkit-tap-highlight-color: transparent;
}
.ni span:first-child{
font-size:24px;
display:block;
transition: transform .25s cubic-bezier(.34,1.8,.64,1);
}
.ni span:last-child{
font-size:11px; font-weight:700; color:var(–muted);
letter-spacing:.01em;
}
.ni.act{ background:var(–primary-light); }
.ni.act span:last-child{ color:var(–primary); }
.ni.act span:first-child{ transform:scale(1.25); }
.ni:active span:first-child{ transform:scale(.82); }

/* ── Header ───────────────────────────────── */
.hdr{
padding:16px 20px;
display:flex; align-items:center; justify-content:space-between;
background:#fff;
border-bottom:1.5px solid var(–border);
flex-shrink:0;
}

/* ── XP Badge ─────────────────────────────── */
.xpb{
display:inline-flex; align-items:center; gap:5px;
background:linear-gradient(135deg,#F59F00,#F97316);
color:#fff; padding:7px 14px; border-radius:20px;
font-size:13px; font-weight:800;
box-shadow: 0 3px 0 #c47b00, 0 4px 14px rgba(245,159,0,.3);
letter-spacing:.02em;
}

/* ── Progress bar ─────────────────────────── */
.pb{ height:9px; background:var(–border); border-radius:99px; overflow:hidden; margin:6px 0 10px; }
.pf{
height:100%;
background:linear-gradient(90deg,#1A56DB,#0E7490);
border-radius:99px;
transition: width .65s cubic-bezier(.4,0,.2,1);
}

/* ── Chips ────────────────────────────────── */
.chip{ display:inline-flex; align-items:center; padding:5px 12px; border-radius:20px; font-size:12px; font-weight:800; letter-spacing:.02em; }
.chip-g{ background:var(–success-light); color:#166534; }
.chip-a{ background:var(–amber-light); color:#92400E; }
.chip-b{ background:var(–teal-light); color:var(–teal); }

/* ── Survey options ───────────────────────── */
.sopt{
display:flex; align-items:center; gap:14px;
padding:15px 16px; border:2.5px solid var(–border);
border-radius:var(–rs); cursor:pointer; margin-bottom:10px;
background:#fff; width:100%; text-align:left;
font-family:inherit; font-size:15px; font-weight:600;
box-shadow: 0 2px 0 var(–border);
transition: transform .12s cubic-bezier(.34,1.56,.64,1), border-color .12s, background .12s, box-shadow .12s;
}
.sopt:active{ transform:scale(.97) translateY(1px); box-shadow:0 1px 0 var(–border); }
.sopt.sel{ border-color:var(–primary); background:var(–primary-light); box-shadow:0 2px 0 #1040B0; }
.dot{ width:22px; height:22px; border-radius:50%; border:2.5px solid var(–border); flex-shrink:0; transition:all .15s; display:flex; align-items:center; justify-content:center; }
.sopt.sel .dot{ border-color:var(–primary); background:var(–primary); }
.sopt.sel .dot::after{ content:‘✓’; color:#fff; font-size:12px; font-weight:800; }

/* ── Quiz options ─────────────────────────── */
.qo{
display:flex; align-items:flex-start; gap:12px;
padding:15px 16px; border:2.5px solid var(–border);
border-radius:var(–rs); cursor:pointer; margin-bottom:11px;
background:#fff; width:100%; text-align:left;
font-family:inherit; font-size:15px; line-height:1.55; font-weight:500;
box-shadow: 0 2px 0 var(–border);
transition: transform .12s cubic-bezier(.34,1.56,.64,1), border-color .12s, background .12s, box-shadow .12s;
}
.qo:active{ transform:scale(.98) translateY(1px); box-shadow:0 0px 0 var(–border); }
.qo.sel{ border-color:var(–primary); background:var(–primary-light); box-shadow:0 2px 0 #1040B0; }
.qo.ok{ border-color:var(–success); background:var(–success-light); box-shadow:0 2px 0 #0d7a32; }
.qo.wr{ border-color:var(–danger); background:var(–danger-light); box-shadow:0 2px 0 #9e1a1a; }
.ql{
width:30px; height:30px; border-radius:9px;
background:var(–off); display:flex; align-items:center;
justify-content:center; font-weight:800; font-size:13px;
flex-shrink:0; color:var(–muted);
border:2px solid var(–border);
transition: background .15s, color .15s, border-color .15s;
}
.qo.ok .ql{ background:var(–success); color:#fff; border-color:var(–success); }
.qo.wr .ql{ background:var(–danger); color:#fff; border-color:var(–danger); }
.qo.sel:not(.ok):not(.wr) .ql{ background:var(–primary); color:#fff; border-color:var(–primary); }

/* ── Lesson rows ──────────────────────────── */
.lr{
display:flex; align-items:center; gap:14px;
padding:15px 0; border-bottom:1.5px solid var(–border);
cursor:pointer;
transition: opacity .15s, background .12s;
}
.lr:active{ opacity:.7; background:var(–off); }
.lr:last-child{ border-bottom:none; }
.li{
width:46px; height:46px; border-radius:14px;
display:flex; align-items:center; justify-content:center;
font-size:20px; flex-shrink:0;
}

/* ── Modal ────────────────────────────────── */
.modal-bg{
position:fixed; inset:0;
background:rgba(0,0,0,.55);
display:flex; align-items:flex-end; justify-content:center;
z-index:999;
backdrop-filter:blur(6px);
-webkit-backdrop-filter:blur(6px);
}
.modal{
background:#fff;
border-radius:28px 28px 0 0;
padding:24px 24px 44px;
width:100%; max-width:430px;
max-height:92vh; overflow-y:auto;
box-shadow: 0 -12px 50px rgba(0,0,0,.18);
animation: slideUp .24s cubic-bezier(.34,1.2,.64,1) both;
}
.hdl{ width:44px; height:5px; background:var(–border); border-radius:99px; margin:0 auto 22px; }

/* ── Feedback boxes ───────────────────────── */
.eb{
background:var(–danger-light); border:2px solid #FECACA;
border-radius:var(–rs); padding:14px 16px;
font-size:14px; color:var(–danger);
margin-bottom:14px; font-weight:600; line-height:1.5;
}
.sb{
background:var(–success-light); border:2px solid #BBF7D0;
border-radius:var(–rs); padding:14px 16px;
font-size:14px; color:var(–success);
margin-bottom:14px; font-weight:600; line-height:1.5;
}

/* ── Spinner ──────────────────────────────── */
.spin{
width:22px; height:22px;
border:3px solid rgba(255,255,255,.3);
border-top-color:#fff; border-radius:50%;
display:inline-block; vertical-align:middle;
}
.spin-d{ border-color:rgba(30,73,118,.15); border-top-color:var(–primary); }
@keyframes sp{ to{ transform:rotate(360deg) } }

/* ── Hero sections ────────────────────────── */
.hero{ background:linear-gradient(145deg,var(–navy) 0%,#1A4080 100%); padding:30px 22px 26px; color:#fff; }
.oh{
background:linear-gradient(160deg,var(–navy) 0%,#1E4976 55%,var(–teal) 100%);
padding:60px 28px 44px; text-align:center; position:relative; overflow:hidden;
}
.oh::before{ content:’’; position:absolute; top:-60px; right:-60px; width:220px; height:220px; border-radius:50%; background:rgba(255,255,255,.06); }
.oh::after{ content:’’; position:absolute; bottom:-80px; left:-40px; width:200px; height:200px; border-radius:50%; background:rgba(255,255,255,.04); }

/* ── Grid ─────────────────────────────────── */
.g2{ display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:16px; }

/* ── Empty states ─────────────────────────── */
.empty{ text-align:center; padding:48px 24px; color:var(–muted); }
.empty .icon{ font-size:56px; margin-bottom:14px; display:block; }

/* ── Typography ───────────────────────────── */
h2{ font-size:22px; font-weight:800; line-height:1.25; }
h3{ font-size:16px; font-weight:700; }

/* ══ ANIMATIONS ══════════════════════════════ */

/* Duolingo-style spring bounce for buttons */
@keyframes btnBounce {
0%   { transform:scale(1); }
40%  { transform:scale(.93); }
70%  { transform:scale(1.04); }
100% { transform:scale(1); }
}

/* Screen entrance */
@keyframes fadeUp {
from { opacity:0; transform:translateY(12px); }
to   { opacity:1; transform:translateY(0); }
}
.screen { animation:fadeUp .24s cubic-bezier(.4,0,.2,1) both; }

/* Tab content */
@keyframes tabFade {
from { opacity:0; transform:translateY(8px); }
to   { opacity:1; transform:translateY(0); }
}
.tab-content { animation:tabFade .2s cubic-bezier(.4,0,.2,1) both; }

/* Modal */
@keyframes slideUp {
from { opacity:0; transform:translateY(32px); }
to   { opacity:1; transform:translateY(0); }
}

/* Badge toast — Duolingo-style pop */
@keyframes popIn {
0%   { opacity:0; transform:scale(.5) translateY(24px); }
55%  { transform:scale(1.12) translateY(-6px); }
75%  { transform:scale(.96) translateY(2px); }
100% { opacity:1; transform:scale(1) translateY(0); }
}
.badge-toast { animation:popIn .45s cubic-bezier(.34,1.56,.64,1) both; }

/* Checkmark pop on lesson complete */
@keyframes checkPop {
0%   { transform:scale(0) rotate(-15deg); }
55%  { transform:scale(1.35) rotate(8deg); }
80%  { transform:scale(.92) rotate(-3deg); }
100% { transform:scale(1) rotate(0); }
}
.check-anim { animation:checkPop .35s cubic-bezier(.34,1.56,.64,1) both; }

/* XP gain number pop */
@keyframes xpPop {
0%   { opacity:0; transform:translateY(0) scale(.7); }
40%  { opacity:1; transform:translateY(-18px) scale(1.15); }
100% { opacity:0; transform:translateY(-36px) scale(.9); }
}
.xp-pop { animation:xpPop .9s ease both; }

/* Shimmer for loading states */
@keyframes shimmer {
0%   { background-position:-300px 0; }
100% { background-position:300px 0; }
}
.shimmer {
background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);
background-size:600px 100%;
animation:shimmer 1.4s infinite;
border-radius:8px;
}

/* Streak / streak-like bounce */
@keyframes streakBounce {
0%,100% { transform:scale(1); }
50%      { transform:scale(1.18); }
}

/* Course card hover lift */
.course-card {
transition: transform .18s cubic-bezier(.34,1.56,.64,1), box-shadow .18s ease;
}
.course-card:active {
transform:scale(.96);
box-shadow: 0 2px 8px rgba(0,0,0,.1);
}

/* Resource cards */
.res-cat-card {
transition: transform .18s cubic-bezier(.34,1.56,.64,1), box-shadow .18s ease;
}
.res-cat-card:active {
transform:scale(.96);
box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
.res-item-card {
transition: transform .16s cubic-bezier(.34,1.56,.64,1);
}
.res-item-card:active { transform:scale(.98); }

/* Resource link button */
.res-link-btn {
transition: transform .14s cubic-bezier(.34,1.56,.64,1), opacity .12s, box-shadow .12s;
}
.res-link-btn:active {
transform:scale(.95);
opacity:.88;
}

/* Nav icon spring */
.ni span:first-child {
transition: transform .28s cubic-bezier(.34,1.8,.64,1);
}
.ni.act span:first-child { transform:scale(1.28); }
.ni:active span:first-child { transform:scale(.78); }

/* Lesson row */
.lr { transition: opacity .15s, background .12s; }
.lr:active { opacity:.65; background:var(–off); }

/* Admin tab */
.admin-tab-btn {
transition: transform .15s cubic-bezier(.34,1.56,.64,1), background .15s;
}
.admin-tab-btn:active { transform:scale(.93); }

/* Chip bounce when awarded */
@keyframes chipIn {
0%   { opacity:0; transform:scale(.4) rotate(-8deg); }
60%  { transform:scale(1.15) rotate(3deg); }
100% { opacity:1; transform:scale(1) rotate(0); }
}
.chip-anim { animation:chipIn .4s cubic-bezier(.34,1.56,.64,1) both; }

/* ── Mentor Character ─────────────────────── */
@keyframes mentorBob {
0%,100% { transform: translateY(0) rotate(-1deg); }
50%      { transform: translateY(-5px) rotate(1deg); }
}
@keyframes mentorPop {
0%   { opacity:0; transform:scale(.7) translateY(8px); }
60%  { transform:scale(1.06) translateY(-2px); }
100% { opacity:1; transform:scale(1) translateY(0); }
}
@keyframes bubbleFadeIn {
from { opacity:0; transform:translateX(-8px); }
to   { opacity:1; transform:translateX(0); }
}
.mentor-wrap {
display:flex; align-items:flex-end; gap:10px;
margin-bottom:18px;
animation: mentorPop .4s cubic-bezier(.34,1.56,.64,1) both;
}
.mentor-avatar {
width:80px; height:100px; flex-shrink:0;
display:flex; align-items:flex-end; justify-content:center;
animation: mentorBob 3.2s ease-in-out infinite;
filter: drop-shadow(0 4px 8px rgba(0,0,0,.15));
cursor:default; user-select:none;
}
.mentor-bubble {
background:#fff;
border:2px solid var(–border);
border-radius:18px 18px 18px 4px;
padding:13px 16px;
font-size:15px; line-height:1.65;
color:var(–text); font-weight:500;
box-shadow: 0 4px 16px rgba(0,0,0,.08), 0 2px 0 var(–border);
position:relative; flex:1;
animation: bubbleFadeIn .35s .15s cubic-bezier(.4,0,.2,1) both;
}
.mentor-bubble::before {
content:’’;
position:absolute; left:-10px; bottom:10px;
width:0; height:0;
border-top:8px solid transparent;
border-bottom:8px solid transparent;
border-right:10px solid var(–border);
}
.mentor-bubble::after {
content:’’;
position:absolute; left:-7px; bottom:11px;
width:0; height:0;
border-top:7px solid transparent;
border-bottom:7px solid transparent;
border-right:9px solid #fff;
}
.mentor-name {
font-size:11px; font-weight:800; color:var(–primary);
letter-spacing:.04em; margin-bottom:4px;
text-transform:uppercase;
}
.mentor-section {
background: linear-gradient(135deg,var(–primary-light),#f0f9ff);
border-radius:16px; padding:16px;
margin-bottom:20px;
border:1.5px solid rgba(26,86,219,.12);
}
.lesson-paragraph {
font-size:15px; line-height:1.75; color:#1e293b;
margin-bottom:14px; font-weight:400;
}
.lesson-heading {
font-size:17px; font-weight:800; color:var(–navy);
margin:22px 0 10px; letter-spacing:-.01em;
}
.lesson-bullet {
display:flex; align-items:flex-start; gap:10px;
margin-bottom:10px; font-size:15px; line-height:1.6; color:#1e293b;
}
.lesson-bullet-dot {
width:8px; height:8px; border-radius:50%;
background:var(–primary); flex-shrink:0; margin-top:7px;
}
</style>

</head>

if (token) headers[‘Authorization’] = ’Bearer ’ + token;

async function genId(){

return s.replace(/[xy]/g,function(c){
var r=Math.random()*16|0, v=c===‘x’?r:(r&0x3|0x8);
return v.toString(16);
});
}

async function sbPost(table, body, token) {

}

if(this.user.id && this.token) {
var _ph = authH(this.token);

}

checkCourseCompletion: function(lessonId) {
for(var _ci=0;_ci<this.courses.length;_ci++){var course=this.courses[_ci];
var lessons=[];for(var _mi=0;_mi<course.modules.length;_mi++){for(var _li=0;_li<course.modules[_mi].lessons.length;_li++){lessons.push(course.modules[_mi].lessons[_li]);}}
if(!lessons.length) continue;
var _hasLesson=false;for(var _hli=0;_hli<lessons.length;_hli++){if(lessons[_hli].id===lessonId){_hasLesson=true;break;}} if(!_hasLesson) continue;
var allDone=true;for(var _ai=0;_ai<lessons.length;_ai++){if(!this.progress[lessons[_ai].id]){allDone=false;break;}}
if(allDone){
var badges=this.getBadges();
var _hasBadge=false;for(var _bi=0;_bi<badges.length;_bi++){if(badges[_bi].course_id===course.id){_hasBadge=true;break;}} if(!_hasBadge){
// Award badge!
if(this.user&&this.user.id&&this.token){

var existing=this.getBadges();
existing.push(row);
localStorage.setItem(‘pw_badges’,JSON.stringify(existing));
}
// Show celebration
setTimeout(()=>showBadgeToast(course.emoji||‘🏆’,course.title),300);
}
}
}
},
isDone: function(id){ return !!this.progress[id]; },
getBadges: function(){ try{return JSON.parse(localStorage.getItem(‘pw_badges’)||’[]’);}catch(e){return[];} },
totalXP: function(){ var self=this,total=0,keys=Object.keys(this.progress); for(var i=0;i<keys.length;i++){var id=keys[i];for(var ci=0;ci<this.courses.length;ci++){for(var mi=0;mi<this.courses[ci].modules.length;mi++){for(var li=0;li<this.courses[ci].modules[mi].lessons.length;li++){var l=this.courses[ci].modules[mi].lessons[li];if(l.id===id){total+=l.xp||0;}}}}}  return total; }
};
