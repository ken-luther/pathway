  function openResourceModal(resource, catId) {
    var ovId = 'rres-overlay';
    closeOverlay(ovId);

    // Full screen overlay with scroll
    var ov = document.createElement('div');
    ov.id = ovId;
    ov.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;z-index:99999;background:rgba(0,0,0,.6);';

    // Inner scroll container
    var scroll = document.createElement('div');
    scroll.style.cssText = 'position:absolute;top:0;left:0;right:0;bottom:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 14px 60px;';

    var m = document.createElement('div');
    m.style.cssText = 'background:#fff;border-radius:16px;padding:18px 16px;max-width:440px;margin:0 auto;';
    m.addEventListener('click', function(e){ e.stopPropagation(); });

    function addLbl(txt) {
      var l = document.createElement('div');
      l.style.cssText = 'font-size:12px;font-weight:700;color:#444;margin-top:12px;margin-bottom:4px;';
      l.textContent = txt;
      m.appendChild(l);
    }
    function addInp(placeholder, val) {
      var i = document.createElement('input');
      i.type = 'text';
      i.placeholder = placeholder||'';
      i.value = val||'';
      i.style.cssText = 'width:100%;box-sizing:border-box;border:2px solid #e5e7eb;border-radius:8px;padding:11px 12px;font-size:15px;font-family:inherit;-webkit-appearance:none;outline:none;display:block;';
      m.appendChild(i);
      return i;
    }
    function addTa(placeholder, val) {
      var t = document.createElement('textarea');
      t.placeholder = placeholder||'';
      t.value = val||'';
      t.rows = 3;
      t.style.cssText = 'width:100%;box-sizing:border-box;border:2px solid #e5e7eb;border-radius:8px;padding:11px 12px;font-size:14px;font-family:inherit;-webkit-appearance:none;outline:none;display:block;resize:vertical;';
      m.appendChild(t);
      return t;
    }

    var titleEl = document.createElement('div');
    titleEl.style.cssText = 'font-weight:700;font-size:18px;color:#1a1a2e;margin-bottom:4px;';
    titleEl.textContent = (resource ? 'Edit' : 'New') + ' Resource';
    m.appendChild(titleEl);

    addLbl('Title *');
    var iTitle = addInp('e.g. THP Housing Program', resource ? resource.title : '');

    addLbl('Description');
    var iBody = addTa('What is this resource? Who is it for?', resource ? (resource.body||'') : '');

    addLbl('🔗 Link URL');
    var iLink = addInp('https://website.com', resource ? (resource.link_url||'') : '');

    addLbl('Link Button Text');
    var iLinkLabel = addInp('e.g. Apply Now, Learn More', resource ? (resource.link_label||'Learn More') : 'Learn More');

    addLbl('Image URL (optional)');
    var iImage = addInp('https://... paste a direct image link', resource ? (resource.image_url||'') : '');

    addLbl('Order (0 = show first)');
    var iOrderEl = document.createElement('input');
    iOrderEl.type = 'number';
    iOrderEl.value = resource ? String(resource.order_index||0) : String(S.resources.filter(function(r){return r.category_id===catId;}).length);
    iOrderEl.style.cssText = 'width:80px;border:2px solid #e5e7eb;border-radius:8px;padding:10px 12px;font-size:15px;font-family:inherit;-webkit-appearance:none;outline:none;display:block;';
    m.appendChild(iOrderEl);

    var statusEl = document.createElement('div');
    statusEl.style.cssText = 'font-size:13px;color:#e74c3c;min-height:18px;margin-top:10px;';
    m.appendChild(statusEl);

    var btnRow = document.createElement('div');
    btnRow.style.cssText = 'display:flex;gap:10px;margin-top:14px;';

    var cancelBtn = document.createElement('button');
    cancelBtn.textContent = 'Cancel';
    cancelBtn.style.cssText = 'flex:1;padding:13px;border:2px solid #ddd;border-radius:10px;background:#fff;font-size:15px;cursor:pointer;font-family:inherit;';
    cancelBtn.addEventListener('click', function(){ closeOverlay(ovId); });

    var saveBtn = document.createElement('button');
    saveBtn.textContent = 'Save Resource';
    saveBtn.style.cssText = 'flex:2;padding:13px;border:none;border-radius:10px;background:#1E4976;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;';
    saveBtn.addEventListener('click', function() {
      var t = iTitle.value.trim();
      if(!t){ statusEl.textContent='Title is required.'; return; }
      statusEl.textContent='';
      saveBtn.textContent='Saving...';
      saveBtn.disabled=true;
      var data = {
        category_id: resource ? resource.category_id : catId,
        title: t,
        body: iBody.value||'',
        link_url: iLink.value.trim(),
        link_label: iLinkLabel.value.trim()||'Learn More',
        image_url: iImage.value.trim(),
        order_index: parseInt(iOrderEl.value)||0
      };
      var p = resource
        ? sbPatch('resources','?id=eq.'+resource.id, data, S.token)
        : sbPost('resources', data, S.token);
      p.then(function(r){
        if(!r.ok){
          statusEl.textContent='Save failed ('+r.status+'). Make sure create_resources_tables.sql has been run in Supabase.';
          saveBtn.textContent='Save Resource'; saveBtn.disabled=false; return;
        }
        closeOverlay(ovId); reload();
      }).catch(function(e){
        statusEl.textContent='Error: '+e.message;
        saveBtn.textContent='Save Resource'; saveBtn.disabled=false;
      });
    });

    btnRow.appendChild(cancelBtn);
    btnRow.appendChild(saveBtn);
    m.appendChild(btnRow);
    scroll.appendChild(m);
    ov.appendChild(scroll);
    ov.addEventListener('click', function(){ closeOverlay(ovId); });
    document.body.appendChild(ov);
    setTimeout(function(){ iTitle.focus(); }, 80);
  }

  function render() {
    while(wrap.firstChild) wrap.removeChild(wrap.firstChild);

    var topRow = div({style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}});
    topRow.appendChild(div({style:{fontWeight:700,fontSize:17,color:'#1a1a2e'}}, '🗺️ Pathway Categories'));
    topRow.appendChild(btn({class:'btn',style:{width:'auto',padding:'7px 14px',fontSize:13},'click':function(){openCatModal(null);}}, '+ Category'));
    wrap.appendChild(topRow);

    if(S.resourceCats.length===0) {
      wrap.appendChild(div({style:{color:'#888',fontSize:14,padding:'20px 0',lineHeight:1.6}},
        'No categories yet.',
        div({style:{marginTop:8,fontSize:12,color:'#aaa'}},'Note: Run create_resources_tables.sql in Supabase if you have not already.')
      ));
    }

    S.resourceCats.forEach(function(cat) {
      var catItems = S.resources.filter(function(r){return r.category_id===cat.id;});
      var isOpen = _openCatId === cat.id;

      var catRow = div({
        style:{background:'#fff',borderRadius:isOpen?'12px 12px 0 0':12,padding:'12px 14px',display:'flex',alignItems:'center',gap:10,cursor:'pointer',boxShadow:'0 1px 4px rgba(0,0,0,.07)',marginBottom:isOpen?0:10,border:'1.5px solid '+(isOpen?'#1E4976':'transparent')},
        click:function(){_openCatId = isOpen ? null : cat.id; render();}
      },
        div({style:{width:38,height:38,borderRadius:9,background:cat.color||'#1E4976',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}, cat.emoji||'📌'),
        div({style:{flex:1,minWidth:0}},
          div({style:{fontWeight:700,fontSize:15,color:'#1a1a2e'}}, cat.title),
          div({style:{fontSize:12,color:'#888'}}, catItems.length+' resource'+(catItems.length===1?'':'s'))
        ),
        btn({class:'btn-icon',style:{marginRight:2},'click':function(e){e.stopPropagation();openCatModal(cat);}}, '✏️'),
        btn({class:'btn-icon',style:{color:'#e74c3c'},'click':function(e){e.stopPropagation();if(confirm('Delete this category and all its resources?')){sbDelete('resource_categories','?id=eq.'+cat.id,S.token).then(function(){reload();});}}}, '🗑️'),
        span({style:{color:'#aaa',fontSize:16,marginLeft:2}}, isOpen?'▲':'▼')
      );
      wrap.appendChild(catRow);

      if(isOpen) {
        var body = div({style:{background:'#f9f9f9',borderRadius:'0 0 12px 12px',border:'1.5px solid #1E4976',borderTop:'none',padding:'10px 12px 12px',marginBottom:10}});
        body.appendChild(btn({class:'btn',style:{width:'100%',marginBottom:catItems.length?10:0,padding:'8px',fontSize:13},'click':function(){openResourceModal(null, cat.id);}}, '+ Add Resource'));

        catItems.forEach(function(r) {
          var rCard = div({style:{background:'#fff',borderRadius:10,padding:'10px 12px',marginBottom:7,display:'flex',alignItems:'flex-start',gap:8,boxShadow:'0 1px 3px rgba(0,0,0,.06)'}});
          var rInfo = div({style:{flex:1,minWidth:0}});
          rInfo.appendChild(div({style:{fontWeight:600,fontSize:13,color:'#1a1a2e',marginBottom:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}, r.title));
          if(r.body) {
            var prev = div({style:{fontSize:12,color:'#666',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}});
            prev.textContent = r.body.substring(0,60)+(r.body.length>60?'...':'');
            rInfo.appendChild(prev);
          }
          if(r.link_url) rInfo.appendChild(div({style:{fontSize:11,color:'#1E4976',marginTop:2}}, '🔗 '+r.link_url.replace(/^https?:\/\//,'').substring(0,40)));
          rCard.appendChild(rInfo);
          var acts = div({style:{display:'flex',gap:5,flexShrink:0}});
          acts.appendChild(btn({class:'btn-icon','click':function(){openResourceModal(r, cat.id);}}, '✏️'));
          acts.appendChild(btn({class:'btn-icon',style:{color:'#e74c3c'},'click':function(){if(confirm('Delete this resource?')){sbDelete('resources','?id=eq.'+r.id,S.token).then(function(){reload();});}}}, '🗑️'));
          rCard.appendChild(acts);
          body.appendChild(rCard);
        });
        wrap.appendChild(body);
      }
    });
  }

  render();
  setTimeout(reload, 0);
  return wrap;
}

function AdminStats(container) {
  if(!container) container=div({style:{padding:'13px'}});

  // Survey registry - add future surveys here
  const SURVEYS = {
    onboarding: {
      label: '📋 Onboarding Survey',
      description: 'Completed at signup — baseline financial knowledge',
      keys: [
        {k:'grade', fallback:null, l:'Grade Level'},
        {k:'employment', fallback:'employment_status', l:'Current Employment'},
        {k:'has_bank', fallback:'has_bank_account', l:'Has Bank Account'},
        {k:'ever_budgeted', fallback:null, l:'Ever Made a Budget'},
        {k:'fin_confidence', fallback:'financial_confidence', l:'Financial Confidence'},
        {k:'debt_knowledge', fallback:null, l:'Understands Debt / Interest'},
        {k:'college_plan', fallback:null, l:'Plans After High School'},
        {k:'loan_awareness', fallback:null, l:'Student Loan Awareness'},
        {k:'savings_habit', fallback:null, l:'Savings Habit'},
        {k:'biggest_challenge', fallback:null, l:'Biggest Financial Challenge'},
        {k:'taught_finances', fallback:null, l:'Has Been Taught Finances'},
        {k:'investing_knowledge', fallback:null, l:'Investing Knowledge'},
      ]
    }
    // Add future surveys here:
    // exit: { label: '📤 Exit Survey', keys: [...] }
  };

  let activeSurvey = 'onboarding';
  let statsTab = 'survey';

  function buildHeader() {
    container.innerHTML = '';
    // Main tabs
    container.appendChild(div({style:{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap'}},
      ...[['survey','📊 Survey Results'],['users','👤 Users & Resumes']].map(([t,l])=>
        btn({class:'btn btn-sm', style:{
          background:statsTab===t?'var(--primary)':'#fff',
          color:statsTab===t?'#fff':'var(--muted)',
          border:statsTab===t?'none':'2px solid var(--border)',
          marginBottom:0, fontWeight:700
        },'click':()=>{statsTab=t;load();}}, l)
      )
    ));
    if(statsTab==='survey') {
      // Survey selector for future multiple surveys
      const surveyKeys = Object.keys(SURVEYS);
      if(surveyKeys.length > 1) {
        container.appendChild(div({style:{display:'flex',gap:6,marginBottom:12,flexWrap:'wrap'}},
          ...surveyKeys.map(k=>btn({class:'btn btn-sm', style:{
            background:activeSurvey===k?'var(--teal)':'#fff',
            color:activeSurvey===k?'#fff':'var(--muted)',
            border:activeSurvey===k?'none':'2px solid var(--border)',
            marginBottom:0,fontSize:12
          },'click':()=>{activeSurvey=k;load();}}, SURVEYS[k].label))
        ));
      }
    }
    container.appendChild(div({id:'stats-body'}));
  }

  async function load() {
    buildHeader();
    const body = document.getElementById('stats-body');
    if(!body) return;
    body.innerHTML='';
    body.appendChild(div({style:{textAlign:'center',padding:'30px'}},div({class:'spin spin-d'})));

    const [profRes, badgeRes] = await Promise.all([
      sbGet('profiles','?order=xp_total.desc',S.token||undefined),
      sbGet('user_badges','?order=earned_at.desc',S.token||undefined),
    ]);
    const profiles = profRes.ok && Array.isArray(profRes.data) ? profRes.data : [];
    const badges = badgeRes.ok && Array.isArray(badgeRes.data) ? badgeRes.data : [];
    body.innerHTML = '';

    // Stats summary row
    const answered = profiles.filter(p=>p.grade||p.employment||p.fin_confidence).length;
    body.appendChild(div({style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:8,marginBottom:16}},
      ...[
        {l:'Total Users',v:profiles.length,e:'👥',c:'var(--primary)'},
        {l:'Survey Filled',v:answered,e:'📋',c:'var(--teal)'},
        {l:'Avg XP',v:profiles.length>0?Math.round(profiles.reduce((s,p)=>s+(p.xp_total||0),0)/profiles.length):0,e:'⚡',c:'var(--amber)'},
        {l:'Badges Given',v:badges.length,e:'🏆',c:'#8b5cf6'},
      ].map(s=>div({class:'card',style:{padding:'10px 8px',textAlign:'center',marginBottom:0}},
        div({style:{fontSize:18,marginBottom:3}},s.e),
        div({style:{fontSize:18,fontWeight:700,color:s.c}},s.v),
        div({style:{fontSize:10,color:'var(--muted)',fontWeight:600,lineHeight:1.3}},s.l)
      ))
    ));

    if(statsTab==='survey') {
      const survey = SURVEYS[activeSurvey];
      body.appendChild(div({style:{marginBottom:8}},
        h('h3',{style:{fontSize:15,marginBottom:2}},survey.label),
        p({style:{fontSize:12,color:'var(--muted)',marginBottom:12}},survey.description+' · '+answered+' responses')
      ));

      if(!profiles.length || !answered) {
        body.appendChild(div({class:'empty',style:{padding:'30px 0'}},
          div({class:'icon',style:{fontSize:40}},'📊'),
          p({style:{color:'var(--muted)',fontSize:14,fontWeight:500}},'No survey responses yet.'),
          p({style:{color:'var(--muted)',fontSize:12,marginTop:4}},'Survey answers appear here once users sign up.')
        ));
        return;
      }

      const COLORS=['#1A56DB','#0E7490','#F59F00','#8b5cf6','#ec4899','#10b981','#f97316','#ef4444'];

      survey.keys.forEach(q=>{
        // Collect answers using primary key + fallback
        const counts={};
        let total=0;
        profiles.forEach(pr=>{
          const v = pr[q.k] || (q.fallback&&pr[q.fallback]) || null;
          if(v && v!=='null'){counts[v]=(counts[v]||0)+1;total++;}
        });

        if(!total) return; // Skip questions with no data

        const rows = Object.entries(counts).sort((a,b)=>b[1]-a[1]);
        const topAnswer = rows[0];
        let open = false;

        const detailRows = rows.map((r,i)=>div({style:{marginBottom:8}},
          div({style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}},
            span({style:{fontSize:13,color:'var(--text)',flex:1,paddingRight:8,lineHeight:1.4}},r[0]),
            span({style:{fontSize:13,fontWeight:700,color:COLORS[i%COLORS.length],flexShrink:0,minWidth:60,textAlign:'right'}},
              Math.round((r[1]/total)*100)+'%  ('+r[1]+')'
            )
          ),
          div({style:{height:7,background:'var(--border)',borderRadius:99,overflow:'hidden'}},
            div({style:{height:7,background:COLORS[i%COLORS.length],borderRadius:99,width:Math.round((r[1]/total)*100)+'%'}})
          )
        ));

        const details = div({style:{display:'none',marginTop:12,paddingTop:12,borderTop:'1px solid var(--border)'}}, ...detailRows);
        const arrow = span({style:{color:'var(--muted)',fontSize:15,flexShrink:0,marginLeft:8}}, '›');

        const card = div({class:'card',style:{marginBottom:10,cursor:'pointer'},'click':()=>{
          open=!open;
          details.style.display=open?'block':'none';
          arrow.textContent=open?'↓':'›';
        }},
          div({style:{display:'flex',alignItems:'center',justifyContent:'space-between'}},
            div({style:{flex:1}},
              div({style:{fontWeight:700,fontSize:14,color:'var(--text)',marginBottom:3}},q.l),
              div({style:{fontSize:12,color:'var(--muted)'}},
                total+' responses · Top: ',
                span({style:{fontWeight:600,color:'var(--primary)'}},topAnswer[0]),
                ' ('+Math.round((topAnswer[1]/total)*100)+'%)'
              )
            ),
            arrow
          ),
          details
        );
        body.appendChild(card);
      });

    } else {
      // Users & Resumes tab
      body.appendChild(h('h3',{style:{fontSize:15,marginBottom:12}},'All Registered Users'));

      if(!profiles.length){
        body.appendChild(div({class:'empty'},div({class:'icon'},'👤'),p({style:{color:'var(--muted)',fontSize:14}},'No users yet.')));
        return;
      }

      profiles.forEach(pr=>{
        const userBadges = badges.filter(b=>b.user_id===pr.id);
        let open = false;

        const surveyAnswers = SURVEYS.onboarding.keys
          .map(q=>({label:q.l, val:pr[q.k]||(q.fallback&&pr[q.fallback])||null}))
          .filter(a=>a.val&&a.val!=='null');

        const details = div({style:{display:'none',marginTop:10,paddingTop:10,borderTop:'1px solid var(--border)'}},
          surveyAnswers.length ? div({style:{marginBottom:10}},
            div({style:{fontWeight:700,fontSize:12,color:'var(--text)',marginBottom:8}},'Survey Answers:'),
            ...surveyAnswers.map(a=>div({style:{display:'flex',gap:8,marginBottom:5,fontSize:13}},
              span({style:{color:'var(--muted)',fontWeight:600,flexShrink:0}},a.label+':'),
              span({style:{color:'var(--text)'}},a.val)
            ))
          ) : p({style:{fontSize:12,color:'var(--muted)',marginBottom:8,fontStyle:'italic'}},'No survey answers recorded.'),
          userBadges.length ? div({style:{marginBottom:10}},
            div({style:{fontWeight:700,fontSize:12,color:'var(--text)',marginBottom:8}},
              'Badges ('+userBadges.length+'):'),
            div({style:{display:'flex',gap:8,flexWrap:'wrap'}},
              ...userBadges.map(b=>div({style:{display:'flex',flexDirection:'column',alignItems:'center',gap:3,width:52}},
                div({style:{width:38,height:38,borderRadius:10,background:'#FEF9C3',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,border:'1.5px solid #F59F00'}},b.emoji||'🏆'),
                span({style:{fontSize:9,textAlign:'center',color:'var(--muted)',lineHeight:1.2}},b.course_title && b.course_title.slice(0,12)||'Badge')
              ))
            )
          ) : null,
          pr.resume_url
            ? h('a',{href:pr.resume_url,target:'_blank',style:{display:'inline-flex',alignItems:'center',gap:7,padding:'9px 14px',background:'var(--primary)',color:'#fff',borderRadius:10,fontSize:13,fontWeight:600,textDecoration:'none',marginTop:4}},'📄 View Resume →')
            : p({style:{fontSize:12,color:'var(--muted)',marginTop:4,fontStyle:'italic'}},'No resume uploaded.')
        );

        const arrow2 = span({style:{color:'var(--muted)',fontSize:15,flexShrink:0}}, '›');
        const card = div({class:'card',style:{marginBottom:8,cursor:'pointer'},'click':()=>{
          open=!open;details.style.display=open?'block':'none';arrow2.textContent=open?'↓':'›';
        }},
          div({style:{display:'flex',alignItems:'center',gap:10}},
            div({style:{width:40,height:40,borderRadius:'50%',background:'linear-gradient(135deg,var(--primary),var(--teal))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}},pr.profile_emoji||'😊'),
            div({style:{flex:1,minWidth:0}},
              div({style:{fontWeight:700,fontSize:14,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},(pr.full_name||pr.email && pr.email.split('@')[0]||'User')+(pr.is_admin?' 👑':'')),
              div({style:{fontSize:12,color:'var(--muted)',marginTop:2}},pr.email||'','  ·  ⚡'+(pr.xp_total||0)+' XP  ·  🏆'+userBadges.length+' badges')
            ),
            arrow2
          ),
          details
        );
        body.appendChild(card);
      });
    }
  }

  load();
}



// -- START ---------------------------------------------------------------------
const _S = {
  init: function() {
    try { this.user = JSON.parse(localStorage.getItem('pw_u')||'null'); } catch(e){}
    try { this.progress = JSON.parse(localStorage.getItem('pw_p')||'{}'); } catch(e){}
    this.token = localStorage.getItem('pw_t')||null;
  }
};
S.init();

// Start the app - wrapped in DOMContentLoaded to be safe
function _start() {
  if (S.user && S.user.email) {
    // Returning user - go straight to login screen with email pre-filled
    _step = 'login';
    _form.email = S.user.email;
  }
  showSplash();
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', _start);
} else {
  _start();
}
</script>
